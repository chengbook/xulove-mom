    const envelopeBtn = document.getElementById(&#39;envelopeBtn&#39;);<br>

    const petalsContainer = document.getElementById(&#39;petalsContainer&#39;);<br>
    const bgMusic = document.getElementById(&#39;bgMusic&#39;);<br>

<pre><code>// 👇 修改这里的祝福语
customMessage.innerHTML = &#39;谢谢你做我的妈妈&lt;br&gt;是我这辈子最大的幸运&lt;br&gt;愿你永远健康、美丽&#39;;

let musicPlaying = false;

function startPetals() {
  setInterval(() =&gt; {
    const petal = document.createElement(&#39;div&#39;);
    petal.classList.add(&#39;petal&#39;);
    petal.innerHTML = &#39;❤️&#39;;
    petal.style.left = Math.random() * 100 + &#39;%&#39;;
    petal.style.fontSize = (Math.random() * 20 + 20) + &#39;px&#39;;
    petal.style.animationDuration = (Math.random() * 4 + 3) + &#39;s&#39;;
    petal.style.color = `hsl(${Math.random() * 30 + 340}, 80%, 70%)`;
    petalsContainer.appendChild(petal);
    setTimeout(() =&gt; petal.remove(), 7000);
  }, 400);
}

function playMusic() {
  if (!musicPlaying) {
    bgMusic.play().then(() =&gt; {
      musicPlaying = true;
      musicToggle.style.display = &#39;flex&#39;;
      musicToggle.innerHTML = &#39;🔊&#39;;
    }).catch(e =&gt; {
      console.log(&#39;自动播放被阻止，用户可以点击音乐图标&#39;);
    });
  }
}

musicToggle.addEventListener(&#39;click&#39;, (e) =&gt; {
  e.stopPropagation();
  if (bgMusic.paused) {
    bgMusic.play();
    musicToggle.innerHTML = &#39;🔊&#39;;
  } else {
    bgMusic.pause();
    musicToggle.innerHTML = &#39;🔇&#39;;
  }
});

envelopeBtn.addEventListener(&#39;click&#39;, () =&gt; {
  envelopeBtn.style.display = &#39;none&#39;;
  card.style.display = &#39;flex&#39;;
  startPetals();
  playMusic();
});

document.body.addEventListener(&#39;click&#39;, playMusic, { once: true });

document.addEventListener(&#39;WeixinJSBridgeReady&#39;, function () {
  bgMusic.play();
  musicPlaying = true;
});
